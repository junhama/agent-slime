<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4a7c59">
  <meta name="description" content="AIエージェントとして自律的に動くカラフルなスライムたちを観察・育成する放置型ゲーム">
  <meta name="keywords" content="放置ゲーム,育成ゲーム,スライム,AIエージェント,シミュレーション">
  
  <title>Agent Slime - AIエージェント育成シミュレーション</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Agent Slime">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Skip Link -->
  <a href="#main-content" class="skip-link">メインコンテンツへスキップ</a>
  
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <span class="header-icon" aria-hidden="true">🤖</span>
        <h1>Agent Slime</h1>
      </div>
      <div class="header-stats" aria-label="ゲーム統計">
        <div class="stat-item" title="エネルギー">
          <span class="stat-icon" aria-hidden="true">⚡</span>
          <span id="energy-display" aria-label="現在のエネルギー">0</span>
        </div>
        <div class="stat-item" title="クリスタル">
          <span class="stat-icon" aria-hidden="true">💎</span>
          <span id="crystal-display" aria-label="クリスタル数">0</span>
        </div>
      </div>
    </header>
    
    <!-- Main Content -->
    <main id="main-content">
      <div id="game-canvas-container">
        <canvas id="game-canvas" aria-label="スライムが動くゲームエリア"></canvas>
        <div id="overlay-ui" class="hidden">
          <div class="boost-panel" role="dialog" aria-labelledby="boost-title">
            <h3 id="boost-title">⚡ 加速介入</h3>
            <p>クリックで2倍速収集 (10秒)</p>
            <button id="boost-btn" aria-label="加速を実行">実行</button>
          </div>
        </div>
      </div>
      
      <div id="slime-panel" class="panel hidden" role="region" aria-label="選択中のエージェント詳細">
        <h3>🧪 エージェント詳細</h3>
        <div id="slime-info"></div>
      </div>
    </main>
    
    <!-- Navigation -->
    <nav class="nav-bar" aria-label="メインナビゲーション">
      <button class="nav-btn active" data-tab="slimes" role="tab" aria-selected="true" aria-controls="tab-slimes">
        <span class="nav-icon" aria-hidden="true">🧪</span>
        <span class="nav-label">スライム</span>
      </button>
      <button class="nav-btn" data-tab="skills" role="tab" aria-selected="false" aria-controls="tab-skills">
        <span class="nav-icon" aria-hidden="true">🌳</span>
        <span class="nav-label">強化</span>
      </button>
      <button class="nav-btn" data-tab="missions" role="tab" aria-selected="false" aria-controls="tab-missions">
        <span class="nav-icon" aria-hidden="true">📋</span>
        <span class="nav-label">ミッション</span>
      </button>
      <button class="nav-btn" data-tab="customize" role="tab" aria-selected="false" aria-controls="tab-customize">
        <span class="nav-icon" aria-hidden="true">🎨</span>
        <span class="nav-label">カスタム</span>
      </button>
    </nav>
    
    <!-- Tab Panels -->
    <div id="tab-slimes" class="tab-panel" role="tabpanel">
      <div class="slime-list" id="slime-list" role="list" aria-label="エージェント一覧"></div>
    </div>
    
    <div id="tab-skills" class="tab-panel hidden" role="tabpanel" hidden>
      <div class="skill-tree">
        <h3>🌳 スキルツリー</h3>
        <div class="skill-grid" id="skill-grid" role="list"></div>
      </div>
    </div>
    
    <div id="tab-missions" class="tab-panel hidden" role="tabpanel" hidden>
      <div class="mission-list" id="mission-list" role="list" aria-label="ミッション一覧"></div>
    </div>
    
    <div id="tab-customize" class="tab-panel hidden" role="tabpanel" hidden>
      <div class="customize-panel">
        <h3>🎨 カスタマイズ</h3>
        <p>ポイント: <span id="custom-points">0</span></p>
        <div class="custom-options">
          <div class="custom-section">
            <h4>色</h4>
            <div class="color-grid" id="color-grid" role="group" aria-label="色選択"></div>
          </div>
          <div class="custom-section">
            <h4>形</h4>
            <div class="shape-grid" id="shape-grid" role="group" aria-label="形状選択"></div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Tips Banner (Buy Me a Coffee) -->
    <footer class="tips-banner" role="complementary" aria-label="開発者支援">
      <a href="https://www.buymeacoffee.com/agentslime" target="_blank" rel="noopener noreferrer" title="Buy Me a Coffeeで支援">
        <span aria-hidden="true">☕</span>
        <span>開発を支援する</span>
      </a>
    </footer>
  </div>
  
  <!-- Scripts -->
  <script src="script.js"></script>
  
  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => console.log('SW registered:', registration))
          .catch(error => console.log('SW registration failed:', error));
      });
    }
  </script>
</body>
</html>
