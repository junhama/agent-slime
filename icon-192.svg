<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="glow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4a7c59" stop-opacity="1"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="20" fill="#1a1a2e"/>
  
  <!-- Slime body -->
  <ellipse cx="50" cy="55" rx="40" ry="35" fill="url(#glow)" filter="url(#shadow)"/>
  
  <!-- Eyes -->
  <circle cx="35" cy="45" r="6" fill="#1a1a2e"/>
  <circle cx="35" cy="43" r="2" fill="white"/>
  <circle cx="65" cy="45" r="6" fill="#1a1a2e"/>
  <circle cx="65" cy="43" r="2" fill="white"/>
  
  <!-- Small mouth -->
  <ellipse cx="50" cy="62" rx="5" ry="3" fill="#1a1a2e"/>
  
  <!-- Highlight -->
  <ellipse cx="50" cy="25" rx="20" ry="8" fill="white" opacity="0.2"/>
</svg>
